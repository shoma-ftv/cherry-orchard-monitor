name: Cherry Orchard ticket check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ticket-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check availability
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python3 cloud_check.py

      - name: Persist state
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "ticket-bot"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "Update availability state"
            git push
          fi
